let started=false;
let over=false;
let score=0;
let hits=0;
let speed=5;
let mosquitoes=[];
let spawnTimer=0;

let player={
 x:120,
 y:260,
 w:100,
 h:130,
 vy:0,
 jump:false
};

// キャラクターの真ん中あたりの高さ
const mosquitoY = player.y + 55;


function jump(){
 if(!started){
  started=true;
  return;
 }
 if(!player.jump&&!over){
  player.vy=-15;
  player.jump=true;
 }
}

document.addEventListener("keydown",e=>{
 if(e.code==="Space") jump();
});

canvas.onclick=()=>{
 if(over) location.reload();
 else jump();
};


function createMosquito(){
 mosquitoes.push({
  x:850,
  y:mosquitoY
 });
}


function gameOver(){
 ctx.fillStyle="rgba(0,0,0,.75)";
 ctx.fillRect(0,0,800,450);
 ctx.fillStyle="white";
 ctx.font="45px sans-serif";
 ctx.fillText("🦟 ゲームオーバー",210,170);
 ctx.font="28px sans-serif";
 ctx.fillText("刺された回数："+hits+"/10",280,230);
 ctx.fillText("Score:"+score,330,280);
 ctx.fillText("タップで再挑戦",280,360);
}


function loop(){
 if(over){
  gameOver();
  return;
 }

 requestAnimationFrame(loop);
 ctx.clearRect(0,0,800,450);

 if(!started){
  ctx.fillStyle="#07152f";
  ctx.fillRect(0,0,800,450);
  ctx.fillStyle="white";
  ctx.font="45px sans-serif";
  ctx.fillText("🦟 蚊よけランゲーム",180,160);
  ctx.font="28px sans-serif";
  ctx.fillText("タップ / SPACEで開始",240,240);
  return;
 }

 ctx.fillStyle="#10152f";
 ctx.fillRect(0,0,800,450);
 ctx.font="60px serif";
 ctx.fillText("🌙",680,90);

 ctx.fillStyle="#333";
 ctx.fillRect(0,360,800,90);


 player.vy+=0.8;
 player.y+=player.vy;

 if(player.y>260){
  player.y=260;
  player.jump=false;
 }

 ctx.drawImage(hero,player.x,player.y,player.w,player.h);


 if(Math.random()<0.006){
  createMosquito();
 }


 mosquitoes.forEach(m=>{
  m.x-=speed;

  ctx.font="45px serif";
  ctx.fillText("🦟",m.x,m.y);


  if(
   m.x<player.x+80 &&
   m.x+40>player.x &&
   m.y>player.y+30 &&
   m.y<player.y+100
  ){
   hits++;
   m.x=-100;
   if(hits>=10) over=true;
  }
 });

 mosquitoes=mosquitoes.filter(m=>m.x>-50);

 score++;

 ctx.fillStyle="white";
 ctx.font="28px sans-serif";
 ctx.fillText("Score:"+score,20,40);
 ctx.fillText("刺された:"+hits+"/10",600,40);
}

loop();
</script>
